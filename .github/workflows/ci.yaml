name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false

env: 
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Rust project - latest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
      - run: cargo build --verbose
      - run: cargo test --all --verbose
      - run: cargo clippy --all -- -D warnings
  publish-docs:
    name: Publish Docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build_and_test           # Only run after the build job succeeds
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Rust toolchain
        run: rustup update stable && rustup default stable
      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked --version 0.7.9
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Re-build documentation
        run: |
          cargo doc --no-deps
      - name: Build Dioxus web app
        working-directory: web
        run: dx build --web --release --package web --debug-symbols false
      - name: Assemble Pages site
        run: |
          mkdir -p target/pages
          cp -R web/target/dx/web/release/web/public/. target/pages/
          mkdir -p target/pages/docs
          cp -R target/doc/. target/pages/docs/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './target/pages/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
